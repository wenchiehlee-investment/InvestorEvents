name: Sync Events to Downstream

on:
  push:
    paths:
      - 'raw_event_upcoming_earnings.csv'
      - 'raw_event_historical_crashes.csv'
      - 'raw_column_definition.md'
  workflow_dispatch:

concurrency:
  group: sync-events
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync up
        uses: BetaHuhn/repo-file-sync-action@latest
        with:
          GH_PAT: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY }}
          CONFIG_PATH: .github/sync-to-Downstream.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true
