name: Weekly Earnings & 法說會 Fetch

on:
  schedule:
    # Every Monday 01:00 UTC = 09:00 Taipei time
    - cron: "0 1 * * 1"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests urllib3 yfinance python-dotenv

      - name: Run fetch
        run: python fetch_upcoming_earnings.py

      - name: Commit updated CSV
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upcoming_earnings.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: weekly update upcoming_earnings.csv [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync to InvestorConference
        if: steps.commit.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: wenchiehlee-money/InvestorConference
          token: ${{ secrets.IC_PAT }}
          path: InvestorConference

      - name: Copy CSV and push to InvestorConference
        if: steps.commit.outputs.changed == 'true'
        run: |
          cp upcoming_earnings.csv InvestorConference/upcoming_earnings.csv
          cd InvestorConference
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upcoming_earnings.csv
          git commit -m "chore: sync upcoming_earnings.csv from InvestorEvents [skip ci]"
          git push
          echo "✓ Pushed to InvestorConference"
