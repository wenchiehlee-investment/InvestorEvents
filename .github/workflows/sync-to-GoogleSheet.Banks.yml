name: Sync to GoogleSheet.Banks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "raw_event_upcoming_earnings.csv"
      - "raw_column_definition_InvestorEvents.md"
      - ".github/sync-to-GoogleSheet.Banks.yml"

jobs:
  sync-to-gsbanks:
    runs-on: ubuntu-latest
    env:
      SYNC_PAT_GSBANKS: ${{ secrets.REPO_FILE_SYNC_WJLEE1020_MONEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync to GoogleSheet.Banks
        if: env.SYNC_PAT_GSBANKS != ''
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ env.SYNC_PAT_GSBANKS }}
          CONFIG_PATH: .github/sync-to-GoogleSheet.Banks.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Skip notice
        if: env.SYNC_PAT_GSBANKS == ''
        run: echo "::warning::REPO_FILE_SYNC_WJLEE1020_MONEY is not configured; skipping GoogleSheet.Banks sync."
